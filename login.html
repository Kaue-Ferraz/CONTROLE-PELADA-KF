<!DOCTYPE html>
<html>
<head>
<title>Login - Controle Pelada</title>
</head>

<body>

<h2>Entrar</h2>

<input id="email" placeholder="Email">
<input id="senha" type="password" placeholder="Senha">

<button onclick="login()">Entrar</button>
<button onclick="criar()">Criar conta</button>

<script type="module">

import { auth, db } from "./firebase.js";
import { createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

window.criar = async function(){

let email = document.getElementById("email").value
let senha = document.getElementById("senha").value

const userCredential = await createUserWithEmailAndPassword(auth,email,senha)

const user = userCredential.user

await setDoc(doc(db,"usuarios",user.uid),{

email: email,
plano: "free",
status: true

})

alert("Conta criada")

}

window.login = async function(){

let email = document.getElementById("email").value
let senha = document.getElementById("senha").value

await signInWithEmailAndPassword(auth,email,senha)

window.location.href="index.html"

}

</script>

</body>
</html>
